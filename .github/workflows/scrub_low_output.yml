name: Scrub Low Output (CLC1/CLC2/CLC3)

on:
  workflow_dispatch:
    inputs:
      apply:
        description: 'Set to "true" to actually delete. Anything else = dry run (preview only).'
        required: true
        default: 'false'

jobs:
  scrub:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Set up Python 3.11
        uses: actions/setup-python@v4
        with:
          python-version: 3.11

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run scrub_low_output.py
        env:
          DB_NAME: ${{ secrets.DB_NAME }}
          DB_USER: ${{ secrets.DB_USER }}
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
          DB_HOST: ${{ secrets.DB_HOST }}
          DB_PORT: ${{ secrets.DB_PORT }}
          SCRUB_APPLY: ${{ github.event.inputs.apply }}
        run: python scrub_low_output.py
